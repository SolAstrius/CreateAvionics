<!-- Admonition styling for the "Yields until the next server tick." aside emitted
     by the patched cct-javadoc fork on @LuaFunction(mainThread = true) methods.
     See https://github.com/SolAstrius/cct-javadoc. -->
<style>
  .cct-yields {
    display: block;
    margin: 0.85em 0;
    padding: 0.55em 0.85em;
    border-left: 4px solid color-mix(in oklab, currentColor 35%, #b8860b);
    background: color-mix(in oklab, currentColor 5%, transparent);
    border-radius: 0 4px 4px 0;
    font-size: 0.95em;
    line-height: 1.45;
  }
  .cct-yields-label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.15em;
    letter-spacing: 0.02em;
    color: color-mix(in oklab, currentColor 55%, #b8860b);
  }
  .cct-yields-label::before {
    content: "\23F3\00A0";  /* ⏳ + nbsp */
  }
  @media (prefers-color-scheme: dark) {
    .cct-yields {
      border-left-color: color-mix(in oklab, currentColor 40%, #fbbf24);
      background: color-mix(in oklab, currentColor 7%, transparent);
    }
    .cct-yields-label {
      color: color-mix(in oklab, currentColor 65%, #fbbf24);
    }
  }
</style>

<!-- Client-side Lua syntax highlighting for guide code blocks.
     illuaminate emits <pre class="highlight"> wrappers but does not tokenize
     markdown-fenced code; cc-tweaked has a custom TSX post-processor for this,
     we just lean on highlight.js. -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
      media="(prefers-color-scheme: light)"
      crossorigin="anonymous"
      referrerpolicy="no-referrer">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
      media="(prefers-color-scheme: dark)"
      crossorigin="anonymous"
      referrerpolicy="no-referrer">
<script defer
        src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script defer
        src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof hljs === 'undefined') return;
    document.querySelectorAll('pre.highlight').forEach(function (el) {
      // Skip blocks illuaminate already tokenized server-side (e.g. @cc.usage
      // examples); those have data-lua-kind and pre-emitted spans.
      if (el.dataset.luaKind || el.querySelector('span')) return;
      el.classList.add('language-lua');
      hljs.highlightElement(el);
    });
  });
</script>
