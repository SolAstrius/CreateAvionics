name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Resolve version
        id: vars
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          gradle_version=$(grep -E '^mod_version=' gradle.properties | cut -d= -f2)
          if [ "$version" != "$gradle_version" ]; then
            echo "::error::Tag version ($version) does not match gradle.properties mod_version ($gradle_version)"
            exit 1
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Collect artifacts
        id: artifacts
        run: |
          mkdir -p release-artifacts
          shopt -s nullglob
          for jar in neoforge/build/libs/*.jar common/build/libs/*.jar; do
            case "$jar" in
              *-sources.jar|*-dev.jar|*-dev-shadow.jar) continue ;;
            esac
            cp "$jar" release-artifacts/
          done
          ls -la release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Create: Avionics ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.version, '-') }}
          files: release-artifacts/*.jar
