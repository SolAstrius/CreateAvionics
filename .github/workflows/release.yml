name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Resolve version
        id: vars
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          gradle_version=$(grep -E '^mod_version=' gradle.properties | cut -d= -f2)
          if [ "$version" != "$gradle_version" ]; then
            echo "::error::Tag version ($version) does not match gradle.properties mod_version ($gradle_version)"
            exit 1
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Collect artifacts
        id: artifacts
        run: |
          mkdir -p release-artifacts
          shopt -s nullglob
          for jar in neoforge/build/libs/*.jar; do
            case "$jar" in
              *-sources.jar|*-dev.jar|*-dev-shadow.jar) continue ;;
            esac
            cp "$jar" release-artifacts/
          done
          ls -la release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Create: Avionics ${{ steps.vars.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: "${{ contains(steps.vars.outputs.version, '-') }}"
          files: release-artifacts/*.jar

      - name: Regenerate updates.json on main
        if: "${{ !contains(steps.vars.outputs.version, '-') }}"
        env:
          MC_VERSION: '1.21.1'
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          python3 - <<'PY'
          import json, os, subprocess
          mc = os.environ['MC_VERSION']
          tags = subprocess.check_output(
              ['git', 'tag', '--list', 'v*', '--sort=v:refname']
          ).decode().split()
          versions = [t[1:] for t in tags if '-' not in t[1:]]
          if not versions:
              raise SystemExit('no stable tags found')
          latest = versions[-1]
          entries = {}
          for v in versions:
              msg = subprocess.check_output(
                  ['git', 'tag', '-l', '--format=%(contents:subject)', f'v{v}']
              ).decode().strip()
              entries[v] = msg or f'Release {v}'
          out = {
              'homepage': 'https://modrinth.com/mod/create-avionics',
              mc: entries,
              'promos': {
                  f'{mc}-recommended': latest,
                  f'{mc}-latest': latest,
              },
          }
          with open('updates.json', 'w') as f:
              json.dump(out, f, indent=2)
              f.write('\n')
          PY

          if git diff --quiet -- updates.json; then
            echo 'updates.json unchanged, skipping commit'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add updates.json
          git commit -m "chore: update updates.json for ${{ steps.vars.outputs.tag }}"
          git push origin main
